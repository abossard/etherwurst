apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: blockscout
  namespace: blockscout
spec:
  suspend: true  # undeployed — set to false to activate
  interval: 1h
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
    cleanupOnFail: true
  chart:
    spec:
      chart: blockscout
      sourceRef:
        kind: HelmRepository
        name: ethereum-helm-charts
        namespace: flux-system
  values:
    fullnameOverride: blockscout
    image:
      repository: blockscout/blockscout
      tag: "v10.0.1"
    config:
      ETHEREUM_JSONRPC_HTTP_URL: http://erigon.ethereum.svc.cluster.local:8545
      ETHEREUM_JSONRPC_TRACE_URL: http://erigon.ethereum.svc.cluster.local:8545
      ETHEREUM_JSONRPC_WS_URL: ws://erigon.ethereum.svc.cluster.local:8546
      ETHEREUM_JSONRPC_VARIANT: erigon
      CHAIN_ID: "1"
      COIN: ETH
      NETWORK: Ethereum
      SUBNETWORK: Mainnet
      FIRST_BLOCK: "23500000"
      TRACE_FIRST_BLOCK: "23500000"
    resources:
      requests:
        cpu: "500m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
    postgresql:
      enabled: true
      image:
        registry: docker.io
        repository: bitnami/postgresql
        tag: "16"
      persistence:
        enabled: true
        storageClass: managed-csi-premium
        size: 500Gi

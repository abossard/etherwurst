# ─── Cryo-based Ethereum ETL ──────────────────────────────────────────
# Uses adx_etl.py (cryo → Parquet → ClickHouse) instead of Python JSON-RPC.
# The adx-etl Docker image includes cryo (Rust) + Python orchestrator.
#
# Backfill: 4 parallel workers split the full block range into segments.
# Sync: CronJob runs every 10 min to keep up with chain head.
# ──────────────────────────────────────────────────────────────────────

# Common env block (referenced by all jobs via &ch-env / *ch-env)
# Note: YAML anchors don't work across documents, so env is repeated.

---
# ─── Backfill worker 1: blocks 0 → 6,000,000 ─────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: cryo-backfill-w1
  namespace: ethereum
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: etl
          image: acrhazscamr3is7.azurecr.io/adx-etl:77f9673
          env:
            - name: ERIGON_RPC_URL
              value: "http://erigon:8545"
            - name: CH_URL
              value: "http://clickhouse-ethereum-analytics:8123/?database=ethereum"
            - name: CH_USER
              value: "etherwurst"
            - name: CH_PASSWORD
              value: "etherwurst-ch-2026"
            - name: START_BLOCK
              value: "0"
            - name: END_BLOCK
              value: "5999999"
            - name: WORKER_ID
              value: "cryo-w1"
            - name: MAX_BLOCKS
              value: "6000000"
            - name: BATCH_SIZE
              value: "2000"
            - name: CRYO_CONCURRENCY
              value: "6"
            - name: CRYO_CHUNK_SIZE
              value: "2000"
            - name: CRYO_RPS
              value: "50"
            - name: EXTRACT_DATASETS
              value: "blocks,transactions,logs"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits: { cpu: "2", memory: 2Gi }

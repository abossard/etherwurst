---
# ─── CronJob for continuous sync (every 10 min, cryo-based) ──────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ethereum-etl-sync
  namespace: ethereum
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: etl
              image: acrhazscamr3is7.azurecr.io/adx-etl:77f9673
              env:
                - name: ERIGON_RPC_URL
                  value: "http://erigon:8545"
                - name: CH_URL
                  value: "http://clickhouse-ethereum-analytics:8123/?database=ethereum"
                - name: CH_USER
                  value: "etherwurst"
                - name: CH_PASSWORD
                  value: "etherwurst-ch-2026"
                - name: WORKER_ID
                  value: "cryo-sync"
                - name: MAX_BLOCKS
                  value: "1000"
                - name: BATCH_SIZE
                  value: "500"
                - name: CRYO_CONCURRENCY
                  value: "6"
                - name: CRYO_CHUNK_SIZE
                  value: "500"
                - name: CRYO_RPS
                  value: "50"
                - name: FIRST_RUN_LOOKBACK
                  value: "100"
                - name: EXTRACT_DATASETS
                  value: "blocks,transactions,logs"
                - name: PYTHONUNBUFFERED
                  value: "1"
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits: { cpu: "1", memory: 1Gi }

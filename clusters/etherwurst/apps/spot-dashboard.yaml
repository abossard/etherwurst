# ─── Persistent Volume Claim ─────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spot-dashboard-data
  namespace: spot-dashboard
  labels:
    app.kubernetes.io/name: spot-dashboard
    app.kubernetes.io/part-of: spot-dashboard
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 2Gi
---
# ─── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spot-dashboard
  namespace: spot-dashboard
  labels:
    app.kubernetes.io/name: spot-dashboard
    app.kubernetes.io/part-of: spot-dashboard
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: spot-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spot-dashboard
        app.kubernetes.io/part-of: spot-dashboard
    spec:
      containers:
        - name: app
          image: ${ACR_LOGIN_SERVER}/spot-dashboard:be04526 # {"$imagepolicy": "flux-system:spot-dashboard"}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DbPath
              value: "/data/spotprices.db"
            - name: CollectIntervalHours
              value: "1"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spot-dashboard-data
---
# ─── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: spot-dashboard
  namespace: spot-dashboard
  labels:
    app.kubernetes.io/name: spot-dashboard
    app.kubernetes.io/part-of: spot-dashboard
spec:
  selector:
    app.kubernetes.io/name: spot-dashboard
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http


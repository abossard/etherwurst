# ─── ADX ETL: Workload Identity ServiceAccount ───────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adx-etl-sa
  namespace: ethereum
  annotations:
    azure.workload.identity/client-id: "${AZURE_APP_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
---
# ─── ADX ETL CronJob ─────────────────────────────────────────────────────────
# Extracts blockchain data from Erigon via cryo (Rust) → Parquet → Blob → ADX.
# Runs daily at 02:00 UTC. ADX auto-stops when idle to minimize cost.
#
# Image: adx-etl — multi-stage Docker build with cryo + Python + Azure CLI.
# Built by build-deploy.sh and pushed to ACR. Tag is updated on deploy.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: adx-etl-sync
  namespace: ethereum
  labels:
    app.kubernetes.io/name: adx-etl
    app.kubernetes.io/part-of: etherwurst
    app.kubernetes.io/component: etl
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 4
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: adx-etl
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: adx-etl-sa
          restartPolicy: OnFailure
          containers:
            - name: etl
              image: ${ACR_LOGIN_SERVER}/adx-etl:4771073 # {"$imagepolicy": "flux-system:adx-etl"}
              imagePullPolicy: Always
              env:
                - name: ERIGON_RPC_URL
                  value: "http://erigon:8545"
                - name: ADX_CLUSTER_URI
                  value: "${AZURE_ADX_CLUSTER_URI}"
                - name: ADX_DATABASE
                  value: "${AZURE_ADX_DATABASE_NAME}"
                - name: AZURE_RESOURCE_GROUP
                  value: "${AZURE_RESOURCE_GROUP}"
                - name: CH_URL
                  value: "http://clickhouse-ethereum-analytics:8123"
                - name: CH_USER
                  value: "etherwurst"
                - name: CH_PASSWORD
                  value: "etherwurst-ch-2026"
                - name: MAX_BLOCKS
                  value: "100000"
                - name: BATCH_SIZE
                  value: "1000"
                - name: CRYO_CONCURRENCY
                  value: "6"
                - name: CRYO_CHUNK_SIZE
                  value: "2000"
                - name: CRYO_RPS
                  value: "50"
                - name: STOP_ADX_AFTER
                  value: "true"
                - name: FIRST_RUN_LOOKBACK
                  value: "1000"
                - name: PYTHONUNBUFFERED
                  value: "1"
              resources:
                requests: { cpu: 100m, memory: 256Mi }
                limits: { cpu: "2", memory: 2Gi }

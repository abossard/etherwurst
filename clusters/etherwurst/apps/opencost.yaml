---
# Minimal Prometheus for OpenCost (scrapes kubelet/cadvisor/kube-state-metrics)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost-prometheus
  namespace: opencost
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      version: "25.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Disable everything except the server and kube-state-metrics
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
    server:
      persistentVolume:
        enabled: false
      retention: "3d"
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          memory: "1Gi"
      # Only scrape what OpenCost needs
      global:
        scrape_interval: 60s
        evaluation_interval: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 1h
  dependsOn:
    - name: opencost-prometheus
  chart:
    spec:
      chart: opencost
      version: "2.5.*"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    serviceAccount:
      create: true
      name: opencost
      annotations:
        azure.workload.identity/client-id: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"

    podLabels:
      azure.workload.identity/use: "true"

    opencost:
      exporter:
        defaultClusterId: "${AZURE_AKS_CLUSTER_NAME}"
        cloudProviderApiKey: ""
        env:
          - name: AZURE_SUBSCRIPTION_ID
            value: "${AZURE_SUBSCRIPTION_ID}"
          - name: AZURE_TENANT_ID
            value: "${AZURE_TENANT_ID}"
          - name: AZURE_CLIENT_ID
            value: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            memory: "256Mi"
        image:
          tag: "1.119.2"

      prometheus:
        internal:
          enabled: true
          namespaceName: opencost
          serviceName: opencost-prometheus-server
          port: 80

      ui:
        enabled: true
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            memory: "64Mi"

---
# Azure pricing config for OpenCost
#
# CPU/RAM ratios used for cost allocation between resources on a node.
# Total node cost comes from Azure Retail Pricing API (no auth needed).
# Storage and network egress values are used directly for PV and network costs.
#
# KNOWN LIMITATIONS (as of OpenCost v1.119.2):
#
# 1. PV STORAGE COSTS = $0
#    The Azure Rate Card API requires authentication. OpenCost uses the deprecated
#    go-autorest/adal library which only supports IMDS — it does NOT support
#    Azure Workload Identity (federated tokens). Result: Rate Card fails, no disk
#    pricing, PV cost = $0. The PVs have correct CSI volumeHandles with full Azure
#    resource IDs, so pricing will work once auth is fixed.
#    Issue: https://github.com/opencost/opencost/issues/3188
#    Fix PR: https://github.com/opencost/opencost/pull/3265 (open, not merged)
#    Workaround: create App Registration with client secret (bypasses WI).
#
# 2. NETWORK COSTS = $0
#    Network bytes are tracked but traffic is not classified (zone/region/internet).
#    OpenCost OSS has no networkCosts DaemonSet (Kubecost-only feature).
#    Egress rates below are configured but unused without traffic classification.
#    Cilium Hubble is running and exports metrics to Prometheus, but OpenCost
#    does not consume them.
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencost-pricing
  namespace: opencost
data:
  azure.json: |
    {
      "provider": "custom",
      "description": "Azure Germany West Central. Retail API used for total node cost; these ratios split CPU/RAM/GPU. Storage and network values used directly.",
      "CPU": "0.044",
      "spotCPU": "0.013",
      "RAM": "0.0055",
      "spotRAM": "0.0015",
      "GPU": "0.95",
      "storage": "0.00016438",
      "zoneNetworkEgress": "0.01",
      "regionNetworkEgress": "0.02",
      "internetNetworkEgress": "0.087",
      "natGatewayEgress": "0.045",
      "natGatewayIngress": "0.045",
      "spotLabel": "kubernetes.azure.com/scalesetpriority",
      "spotLabelValue": "spot",
      "azureSubscriptionID": "${AZURE_SUBSCRIPTION_ID}",
      "azureClientID": "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}",
      "azureClientSecret": "",
      "azureTenantID": "${AZURE_TENANT_ID}"
    }
---
# Minimal Prometheus for OpenCost (scrapes kubelet/cadvisor/kube-state-metrics)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost-prometheus
  namespace: opencost
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      version: "25.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Disable everything except the server and kube-state-metrics
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
    server:
      persistentVolume:
        enabled: false
      retention: "3d"
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          memory: "1Gi"
      # Only scrape what OpenCost needs
      global:
        scrape_interval: 60s
        evaluation_interval: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 1h
  dependsOn:
    - name: opencost-prometheus
  chart:
    spec:
      chart: opencost
      version: "2.5.*"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    serviceAccount:
      create: true
      name: opencost
      annotations:
        azure.workload.identity/client-id: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"

    podLabels:
      azure.workload.identity/use: "true"

    # Pod-level extra volumes (root level in chart)
    extraVolumes:
      - name: pricing-config
        configMap:
          name: opencost-pricing

    opencost:
      exporter:
        defaultClusterId: "${AZURE_AKS_CLUSTER_NAME}"
        cloudProviderApiKey: ""
        env:
          - name: AZURE_SUBSCRIPTION_ID
            value: "${AZURE_SUBSCRIPTION_ID}"
          - name: AZURE_TENANT_ID
            value: "${AZURE_TENANT_ID}"
          - name: AZURE_CLIENT_ID
            value: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            memory: "256Mi"
        image:
          tag: "1.119.2"
        extraVolumeMounts:
          - name: pricing-config
            mountPath: /var/configs

      customPricing:
        enabled: false

      prometheus:
        internal:
          enabled: true
          namespaceName: opencost
          serviceName: opencost-prometheus-server
          port: 80

      ui:
        enabled: true
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            memory: "64Mi"

---
# Azure pricing config for OpenCost
# CPU/RAM ratios used for allocation; total node cost from Azure Retail API.
# Storage and network egress values used directly.
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencost-pricing
  namespace: opencost
data:
  azure.json: |
    {
      "provider": "custom",
      "description": "Azure Germany West Central. Retail API used for total node cost; these ratios split CPU/RAM/GPU. Storage and network values used directly.",
      "CPU": "0.044",
      "spotCPU": "0.013",
      "RAM": "0.0055",
      "spotRAM": "0.0015",
      "GPU": "0.95",
      "storage": "0.00016438",
      "zoneNetworkEgress": "0.01",
      "regionNetworkEgress": "0.02",
      "internetNetworkEgress": "0.087",
      "natGatewayEgress": "0.045",
      "natGatewayIngress": "0.045",
      "spotLabel": "kubernetes.azure.com/scalesetpriority",
      "spotLabelValue": "spot",
      "azureSubscriptionID": "${AZURE_SUBSCRIPTION_ID}",
      "azureClientID": "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}",
      "azureClientSecret": "",
      "azureTenantID": "${AZURE_TENANT_ID}"
    }
---
# Minimal Prometheus for OpenCost (scrapes kubelet/cadvisor/kube-state-metrics)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost-prometheus
  namespace: opencost
spec:
  interval: 1h
  chart:
    spec:
      chart: prometheus
      version: "25.*"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Disable everything except the server and kube-state-metrics
    alertmanager:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    kube-state-metrics:
      enabled: true
    server:
      persistentVolume:
        enabled: false
      retention: "3d"
      resources:
        requests:
          cpu: "100m"
          memory: "512Mi"
        limits:
          memory: "1Gi"
      # Only scrape what OpenCost needs
      global:
        scrape_interval: 60s
        evaluation_interval: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opencost
  namespace: opencost
spec:
  interval: 1h
  dependsOn:
    - name: opencost-prometheus
  chart:
    spec:
      chart: opencost
      version: "2.5.*"
      sourceRef:
        kind: HelmRepository
        name: opencost
        namespace: flux-system
  values:
    serviceAccount:
      create: true
      name: opencost
      annotations:
        azure.workload.identity/client-id: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"

    podLabels:
      azure.workload.identity/use: "true"

    # Pod-level extra volumes (root level in chart)
    extraVolumes:
      - name: pricing-config
        configMap:
          name: opencost-pricing

    opencost:
      exporter:
        defaultClusterId: "${AZURE_AKS_CLUSTER_NAME}"
        cloudProviderApiKey: ""
        env:
          - name: AZURE_SUBSCRIPTION_ID
            value: "${AZURE_SUBSCRIPTION_ID}"
          - name: AZURE_TENANT_ID
            value: "${AZURE_TENANT_ID}"
          - name: AZURE_CLIENT_ID
            value: "${AZURE_OPENCOST_IDENTITY_CLIENT_ID}"
        resources:
          requests:
            cpu: "50m"
            memory: "128Mi"
          limits:
            memory: "256Mi"
        image:
          tag: "1.119.2"
        extraVolumeMounts:
          - name: pricing-config
            mountPath: /var/configs

      customPricing:
        enabled: false

      prometheus:
        internal:
          enabled: true
          namespaceName: opencost
          serviceName: opencost-prometheus-server
          port: 80

      ui:
        enabled: true
        resources:
          requests:
            cpu: "10m"
            memory: "32Mi"
          limits:
            memory: "64Mi"

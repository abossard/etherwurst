# VPA resources for ethereum namespace workloads
# Review recommendations with: kubectl get vpa -n ethereum -o yaml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-erigon
  namespace: ethereum
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: erigon
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: erigon
        minAllowed:
          cpu: "4"
          memory: "16Gi"
        maxAllowed:
          cpu: "7"
          memory: "30Gi"
      - containerName: etl-sidecar
        minAllowed:
          cpu: "500m"
          memory: "2Gi"
        maxAllowed:
          cpu: "1"
          memory: "4Gi"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-lighthouse
  namespace: ethereum
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: lighthouse
  updatePolicy:
    updateMode: "InPlaceOrRecreate"
    minReplicas: 1
  resourcePolicy:
    containerPolicies:
      - containerName: lighthouse
        maxAllowed:
          memory: "16Gi"
---
apiVersion: autoscaling.k8s.io/v1

# ─── Premium SSD v2 StorageClass ──────────────────────────────────────
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: managed-csi-premiumv2
provisioner: disk.csi.azure.com
parameters:
  skuName: PremiumV2_LRS
  cachingMode: None
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# ─── Erigon PV: Premium SSD v2, 80k IOPS, zone 2 ────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-erigon-premiumv2
spec:
  capacity:
    storage: 2Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: managed-csi-premiumv2
  csi:
    driver: disk.csi.azure.com
    fsType: ext4
    volumeHandle: /subscriptions/b2af20ad-98fa-4aa7-94c3-059663641d9f/resourceGroups/rg-hazscam-gwc/providers/Microsoft.Compute/disks/erigon-data-premiumv2
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - germanywestcentral-2
---
# ─── Erigon PVC: binds to the Premium SSD v2 PV ──────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: storage-erigon-0
  namespace: ethereum
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Ti
  storageClassName: managed-csi-premiumv2
  volumeName: pv-erigon-premiumv2

# VPA resources for blockscout namespace (recommendation-only mode)
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-blockscout
  namespace: blockscout
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: blockscout
  updatePolicy:
    updateMode: "Off"
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-blockscout-postgresql
  namespace: blockscout
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: blockscout-postgresql
  updatePolicy:
    updateMode: "Off"

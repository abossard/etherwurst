apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: erigon
  namespace: ethereum
spec:
  interval: 1h
  timeout: 30m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
      remediateLastFailure: true
    cleanupOnFail: true
  chart:
    spec:
      chart: erigon
      sourceRef:
        kind: HelmRepository
        name: ethereum-helm-charts
        namespace: flux-system
  values:
    fullnameOverride: erigon
    image:
      repository: erigontech/erigon
      tag: v3.3.8
    caplin:
      enabled: false
    persistence:
      enabled: true
      storageClassName: managed-csi-premium
      size: 2Ti
      accessModes:
        - ReadWriteOnce
    resources:
      requests:
        cpu: "2"
        memory: "16Gi"
    extraArgs:
      - --prune.mode=archive
      - --http.api=eth,net,web3,trace,debug,txpool,erigon,ots
      - --http.corsdomain=*
      - --ws.compression
      - --private.api.addr=0.0.0.0:9090
      - --db.pagesize=16KB
      - --rpc.batch.concurrency=8
      - --rpc.batch.limit=200
      - --db.read.concurrency=32
    p2pNodePort:
      enabled: false
    tolerations:
      - key: ethereum-node
        operator: Equal
        value: "true"
        effect: NoSchedule
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: workload-type
                  operator: In
                  values: ["ethereum"]
    # ── Workload identity for ETL sidecar ──
    serviceAccount:
      create: false
      name: adx-etl-sa
    podLabels:
      azure.workload.identity/use: "true"
    # ── ETL sidecar: localhost RPC for fast backfill ──
    extraContainers:
      - name: etl-sidecar
        image: ${ACR_LOGIN_SERVER}/adx-etl:latest
        imagePullPolicy: Always
        env:
          - name: ERIGON_RPC_URL
            value: "http://localhost:8545"
          - name: ADX_CLUSTER_URI
            value: ""
          - name: ADX_DATABASE
            value: "${AZURE_ADX_DATABASE_NAME}"
          - name: AZURE_RESOURCE_GROUP
            value: "${AZURE_RESOURCE_GROUP}"
          - name: CH_URL
            value: "http://clickhouse-ethereum-analytics:8123/?database=ethereum"
          - name: CH_USER
            value: "etherwurst"
          - name: CH_PASSWORD
            value: "etherwurst-ch-2026"
          - name: SIDECAR_MODE
            value: "true"
          - name: LOOP_SLEEP_SECS
            value: "60"
          - name: MAX_BLOCKS
            value: "500000"
          - name: BATCH_SIZE
            value: "10000"
          - name: CRYO_CONCURRENCY
            value: "32"
          - name: CRYO_CHUNK_SIZE
            value: "10000"
          - name: CRYO_RPS
            value: "500"
          - name: STOP_ADX_AFTER
            value: "false"
          - name: FIRST_RUN_LOOKBACK
            value: "25000000"
          - name: WORKER_ID
            value: "sidecar"
          - name: EXTRACT_DATASETS
            value: "blocks,transactions,logs"
          - name: PYTHONUNBUFFERED
            value: "1"
          - name: AZURE_CONFIG_DIR
            value: "/tmp/.azure"
          - name: HOME
            value: "/tmp"
        resources:
          requests: { cpu: 500m, memory: 512Mi }
          limits: { cpu: "4", memory: 4Gi }
        volumeMounts:
          - name: etl-temp
            mountPath: /tmp/cryo-extract
    extraVolumes:
      - name: etl-temp
        emptyDir:
          sizeLimit: 10Gi

apiVersion: v1
kind: Namespace
metadata:
  name: nginx-gateway
  labels:
    goldilocks.fairwinds.com/enabled: "true"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-gateway-fabric
  namespace: nginx-gateway
spec:
  interval: 1h
  timeout: 10m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: nginx-gateway-fabric
      sourceRef:
        kind: HelmRepository
        name: nginx-gateway
        namespace: flux-system
  values:
    service:
      type: LoadBalancer
      annotations:
        # Use the static public IP provisioned by Bicep (pip-{prefix}-ingress in the main resource group).
        # AKS needs the resource group to find the PIP since it's outside the MC_ group.
        service.beta.kubernetes.io/azure-load-balancer-resource-group: "rg-hazscam-gwc"
        service.beta.kubernetes.io/azure-pip-name: "pip-hazscam-r3is7-ingress"
    nginx:
      pod:
        nodeSelector:
          agentpool: system2
        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
            effect: NoSchedule
    nginxGateway:
      nodeSelector:
        agentpool: system2
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule
